<div class="min-h-screen bg-slate-950 text-white flex flex-col items-center justify-center p-4">
  <!-- Logo y titulo -->
  <div class="text-center mb-10">
    <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <span class="text-white font-bold text-2xl">HS</span>
    </div>
    <h1 class="text-3xl font-bold text-white mb-2">Conectar Dispositivo</h1>
    <p class="text-slate-400">Selecciona tu reloj inteligente para comenzar</p>
  </div>

  <!-- Tarjetas de dispositivos -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-3xl w-full mb-8">
    @for (device of devices; track device.id) {
      <button
        (click)="selectDevice(device.id)"
        class="relative p-6 rounded-xl border-2 transition-all duration-200 flex flex-col items-center gap-4 text-center"
        [ngClass]="selected === device.id ? 'border-emerald-500 bg-emerald-500/10 scale-105' : 'border-slate-700 bg-slate-800/50 hover:border-slate-600 hover:bg-slate-800'"
      >
        <!-- Indicador de seleccion -->
        @if (selected === device.id) {
          <div class="absolute top-3 right-3 w-6 h-6 bg-emerald-500 rounded-full flex items-center justify-center">
            <span class="text-white text-sm font-bold">&#10003;</span>
          </div>
        }

        <!-- Icono del dispositivo (SVG generico para todos) -->
        <div class="w-16 h-16 rounded-xl bg-gradient-to-br {{ device.color }} flex items-center justify-center">
          <svg class="text-white w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
          </svg>
        </div>

        <div>
          <h3 class="font-semibold text-white text-lg">{{ device.nombre }}</h3>
          <p class="text-slate-400 text-sm mt-1">{{ device.marca }}</p>
        </div>
      </button>
    }
  </div>

  <!-- Boton continuar -->
  <button
    (click)="handleContinue()"
    [disabled]="!selected"
    class="px-8 py-3 rounded-lg font-semibold text-lg transition-all duration-200"
    [ngClass]="selected ? 'bg-emerald-500 hover:bg-emerald-600 text-white cursor-pointer' : 'bg-slate-700 text-slate-500 cursor-not-allowed'"
  >
    Continuar
  </button>
</div>
