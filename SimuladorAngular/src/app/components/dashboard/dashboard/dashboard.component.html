<!-- Forced Rebuild -->
@if (loading) {
  <div class="flex items-center justify-center py-20">
    <div class="text-center">
      <div class="w-10 h-10 border-3 border-emerald-500/30 border-t-emerald-500 rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-slate-400 text-sm">Cargando datos...</p>
    </div>
  </div>
} @else {
  <div class="space-y-6">
    <!-- Fila 1: Cards de metricas actuales -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <app-metric-card
        title="Frecuencia Cardíaca"
        [value]="metrics?.ultimoBPM ? formatBPM(metrics.ultimoBPM.bpm) : '--'"
        unit="BPM"
        [sparklineData]="cardData.bpm?.sparkline"
        icon="<svg class='w-5 h-5' viewBox='0 0 24 24' fill='currentColor'><path d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>"
        [color]="getBpmColor(metrics?.ultimoBPM?.bpm)"
      ></app-metric-card>

      <app-metric-card
        title="Pasos Hoy"
        [value]="metrics?.actividadHoy ? formatSteps(metrics.actividadHoy.pasos) : '--'"
        unit="pasos"
        [sparklineData]="cardData.pasos?.sparkline"
        [changePercent]="cardData.pasos?.change"
        icon="<svg class='w-5 h-5' viewBox='0 0 24 24' fill='currentColor'><path d='M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7'/></svg>"
        [color]="getStepsColor(metrics?.actividadHoy?.pasos)"
      ></app-metric-card>

      <app-metric-card
        title="Calorías Hoy"
        [value]="metrics?.actividadHoy ? formatCalories(metrics.actividadHoy.calorias_kcal) : '--'"
        unit="kcal"
        [sparklineData]="cardData.calorias?.sparkline"
        [changePercent]="cardData.calorias?.change"
        icon="<svg class='w-5 h-5' viewBox='0 0 24 24' fill='currentColor'><path d='M17.66 11.2c-.23-.3-.51-.56-.77-.82-.67-.6-1.43-1.03-2.07-1.66C13.33 7.26 13 4.85 13.95 3c-.95.23-1.78.75-2.49 1.32-2.59 2.08-3.61 5.75-2.39 8.9.04.1.08.2.08.33 0 .22-.15.42-.35.5-.22.1-.46.04-.64-.12-.06-.05-.1-.15-.17-1.1-1.43-1.28-3.48-.53-5.12C5.89 10 5 12.3 5.14 14.47c.04.5.1 1 .27 1.5.14.6.4 1.2.72 1.73 1.04 1.73 2.87 2.97 4.84 3.22 2.1.27 4.35-.12 5.96-1.6 1.8-1.66 2.45-4.32 1.5-6.6l-.13-.26c-.2-.45-.47-.87-.78-1.25l.14.01z'/></svg>"
        color="#f97316"
      ></app-metric-card>

      <app-metric-card
        title="Sueño Anoche"
        [value]="metrics?.suenoAnoche ? formatSleepDuration(metrics.suenoAnoche.duracion_total_min) : '--'"
        [sparklineData]="cardData.sueno?.sparkline"
        icon="<svg class='w-5 h-5' viewBox='0 0 24 24' fill='currentColor'><path d='M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z'/></svg>"
        [color]="getSleepColor(metrics?.suenoAnoche?.duracion_total_min)"
      ></app-metric-card>
    </div>

    <!-- Fila 2: Grafica de frecuencia cardiaca (ancho completo) -->
    <div class="block">
      <app-heart-rate-chart [data]="recentData?.lecturasBPM"></app-heart-rate-chart>
    </div>

    <!-- Fila 3: Actividad y Sueno (2 columnas en desktop) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <app-activity-chart class="block" [data]="recentData?.actividades"></app-activity-chart>
      <app-sleep-chart class="block" [data]="recentData?.suenos"></app-sleep-chart>
    </div>

    <!-- Fila 4: HRV y Distancia (2 columnas) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <app-hrv-chart class="block" [data]="recentData?.lecturasBPM"></app-hrv-chart>
      <app-distance-chart class="block" [data]="recentData?.actividades"></app-distance-chart>
    </div>
  </div>
}
