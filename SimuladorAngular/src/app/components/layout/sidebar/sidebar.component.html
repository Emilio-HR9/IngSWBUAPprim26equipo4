<!-- Overlay oscuro en mobile cuando el sidebar esta abierto -->
@if (isOpen) {
  <div
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
    (click)="onClose()"
  ></div>
}

<aside
  class="fixed top-0 left-0 h-full w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-50 transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:z-auto"
  [ngClass]="isOpen ? 'translate-x-0' : '-translate-x-full'"
>
  <!-- Logo y nombre de la app -->
  <div class="flex items-center justify-between px-6 py-5 border-b border-slate-800">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-sm">HS</span>
      </div>
      <span class="text-lg font-bold text-white">HealthSync</span>
    </div>
    <!-- Boton cerrar solo visible en mobile -->
    <button
      (click)="onClose()"
      class="lg:hidden text-slate-400 hover:text-white"
    >
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <!-- Links de navegacion -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-emerald-500/10 text-emerald-500"
        [routerLinkActiveOptions]="{exact: false}"
        (click)="onClose()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:text-white hover:bg-slate-800"
      >
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" [innerHTML]="item.icon"></svg>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Boton de desconectar dispositivo en la parte inferior -->
  <div class="px-3 py-4 border-t border-slate-800">
    <a
      routerLink="/conectar"
      (click)="onClose()"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-red-400 hover:text-red-300 hover:bg-red-500/10 transition-colors"
    >
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
      </svg>
      <span>Desconectar</span>
    </a>
  </div>
</aside>
