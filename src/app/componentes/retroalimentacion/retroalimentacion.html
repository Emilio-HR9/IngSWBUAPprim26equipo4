<div class="container text-center mt-5">

  <h1>Retroalimentación del Ejercicio</h1>

  <div class="card p-4 shadow">

    <h3>{{repActual}} / {{repTotal}} repeticiones</h3>

    <!-- Barra -->
    <div class="progress my-3">
      <div class="progress-bar progress-bar-striped progress-bar-animated"
           [style.width.%]="(repActual/repTotal)*100">
      </div>
    </div>

    <!-- Mensaje -->
    <div *ngIf="mensajeActual" class="alert alert-success text-center fs-4 fw-bold">
      🎉 {{mensajeActual}}
    </div>

    <!-- Gamificación -->
    <h5>⭐ Puntos: {{puntos}}</h5>
    <h6>🔥 Racha: {{racha}}</h6>

    <button class="btn btn-primary"
            (click)="registrarRepeticion()">
      Completar repetición
    </button>

    <button class="btn btn-secondary mt-3"
        (click)="volver()">
  ⬅️ Regresar
</button>

  </div>

</div>
